{{ define "main" }}
<article class="post-single">
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    <time>{{ .Date.Format "2006-01-02" }}</time>
  </header>
  <div class="post-content">
    {{ .Content }}
  </div>
  <nav class="post-nav">
    {{ with .PrevInSection }}
    <a href="{{ .RelPermalink }}" class="prev">← {{ .Title }}</a>
    {{ end }}
    {{ with .NextInSection }}
    <a href="{{ .RelPermalink }}" class="next">{{ .Title }} →</a>
    {{ end }}
  </nav>
</article>
{{ end }}
